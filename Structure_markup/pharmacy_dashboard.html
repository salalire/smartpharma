<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Pharmacy Dashboard</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="../CSS/pharmacy_dashboard.css"/>
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <i class="fas fa-clinic-medical"></i>
      <span id="sidebar-pharmacy-name">My Pharmacy</span>
    </div>

    <nav class="sidebar-nav">
      <a href="#" class="nav-item active" data-section="overview">
        <i class="fas fa-chart-pie"></i> Overview
      </a>
      <a href="#" class="nav-item" data-section="products">
        <i class="fas fa-pills"></i> Products
      </a>
      <a href="#" class="nav-item" data-section="orders">
        <i class="fas fa-shopping-bag"></i> Orders
      </a>
    </nav>

    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="sidebar-avatar">U</div>
        <div class="sidebar-user-info">
          <span class="sidebar-username" id="sidebar-username">Owner</span>
          <span class="sidebar-role">Pharmacy Owner</span>
        </div>
      </div>
      <button class="sidebar-logout-btn" onclick="dashboardLogout()">
        <i class="fas fa-sign-out-alt"></i>
      </button>
    </div>
  </aside>

  <!-- MAIN -->
  <main class="main-content">

    <!-- Top bar -->
    <header class="topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <h2 class="topbar-title" id="topbar-title">Overview</h2>
      <div class="topbar-right">
        <span class="topbar-date" id="topbar-date"></span>
      </div>
    </header>

    <!-- OVERVIEW SECTION -->
    <section class="section active" id="section-overview">
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon blue"><i class="fas fa-pills"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="stat-products">0</span>
            <span class="stat-label">Total Products</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green"><i class="fas fa-shopping-bag"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="stat-orders">0</span>
            <span class="stat-label">Total Orders</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon orange"><i class="fas fa-clock"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="stat-pending">0</span>
            <span class="stat-label">Pending Orders</span>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon teal"><i class="fas fa-coins"></i></div>
          <div class="stat-info">
            <span class="stat-value" id="stat-revenue">ETB 0</span>
            <span class="stat-label">Revenue</span>
          </div>
        </div>
      </div>

      <div class="overview-bottom">
        <div class="quick-actions">
          <h3>Quick Actions</h3>
          <button class="action-btn" onclick="switchSection('products')">
            <i class="fas fa-plus"></i> Add Product
          </button>
          <button class="action-btn secondary" onclick="switchSection('orders')">
            <i class="fas fa-list"></i> View Orders
          </button>
        </div>
      </div>
    </section>

    <!-- PRODUCTS SECTION -->
    <section class="section" id="section-products">
      <div class="section-header">
        <h3>My Products</h3>
        <button class="action-btn" onclick="openProductModal()">
          <i class="fas fa-plus"></i> Add Product
        </button>
      </div>

      <div class="table-wrapper">
        <table class="dash-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Name</th>
              <th>Price (ETB)</th>
              <th>Prescription</th>
              <th>Added</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-tbody">
            <tr><td colspan="6" class="table-empty">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <!-- ORDERS SECTION -->
    <section class="section" id="section-orders">
      <div class="section-header">
        <h3>Orders</h3>
      </div>

      <div class="table-wrapper">
        <table class="dash-table">
          <thead>
            <tr>
              <th>#</th>
              <th>Customer</th>
              <th>Total (ETB)</th>
              <th>Status</th>
              <th>Date</th>
              <th>Update</th>
            </tr>
          </thead>
          <tbody id="orders-tbody">
            <tr><td colspan="6" class="table-empty">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </section>

  </main>

  <!-- PRODUCT MODAL -->
  <div class="modal-overlay hidden" id="product-modal-overlay" onclick="closeProductModal()"></div>
  <div class="modal hidden" id="product-modal">
    <div class="modal-header">
      <h3 id="modal-title">Add Product</h3>
      <button class="modal-close" onclick="closeProductModal()">&#10005;</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="modal-product-id"/>
      <div class="form-group">
        <label>Product Name *</label>
        <input type="text" id="modal-name" placeholder="e.g. Paracetamol 500mg"/>
      </div>
      <div class="form-group">
        <label>Price (ETB) *</label>
        <input type="number" id="modal-price" placeholder="e.g. 350" min="0"/>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="text" id="modal-image" placeholder="https://..."/>
      </div>
      <div class="form-group checkbox-group">
        <label>
          <input type="checkbox" id="modal-prescription"/>
          Requires Prescription
        </label>
      </div>
      <p class="modal-msg" id="modal-msg"></p>
    </div>
    <div class="modal-footer">
      <button class="action-btn" onclick="saveProduct()">Save</button>
      <button class="action-btn secondary" onclick="closeProductModal()">Cancel</button>
    </div>
  </div>

  <script src="../js/auth.js"></script>
  <script src="../js/pharmacy_dashboard.js"></script>
</body>
</html>
